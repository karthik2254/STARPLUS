name: Fetch HDNEA Token

on:
  workflow_dispatch:
  schedule:
    - cron: "*/5 * * * *"

permissions:
  contents: write

concurrency:
  group: hdnea-token
  cancel-in-progress: true

jobs:
  fetch-token:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install jq
        run: |
          sudo apt-get update
          sudo apt-get install -y jq

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Fetch HDNEA Token
        env:
          COOKIE_JSON_URL: ${{ secrets.HDNEA_JSON_URL }}
        shell: bash
        run: |

          set -e

          echo "Fetching HDNEA token..."

          for i in {1..3}; do

            response=$(curl -fsSL "$COOKIE_JSON_URL" || true)

            token=$(echo "$response" | jq -r '.[0].cookie // empty' | sed 's/^__hdnea__=//')

            if [[ -n "$token" ]]; then
              echo "__hdnea__=$token" > fetch.txt
              echo "Token fetched successfully."
              break
            fi

            echo "Attempt $i failed..."
            sleep 5

          done

          if [[ ! -f fetch.txt ]]; then
            echo "Unable to fetch token."
            exit 1
          fi

      - name: Update M3U File
        run: |
          python append_hdnea_m3u.py

      - name: Commit Changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add fetch.txt channels.m3u

          if git diff --cached --quiet; then
            echo "Nothing to commit."
            exit 0
          fi

          git commit -m "Auto update HDNEA token"
          git push
